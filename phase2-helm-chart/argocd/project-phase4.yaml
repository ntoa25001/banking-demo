apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: banking-demo-phase4
  namespace: argocd
  labels:
    app.kubernetes.io/name: banking-demo
    app.kubernetes.io/part-of: banking-demo-phase4
spec:
  description: "Banking Demo Phase 4 - full stack on single-node K3s"
  sourceRepos:
    - https://github.com/ntoa25001/banking-demo.git
  destinations:
    - namespace: banking
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: apps
      kind: "*"
    - group: batch
      kind: "*"
    - group: networking.k8s.io
      kind: "*"
  orphanedResources:
    warn: true
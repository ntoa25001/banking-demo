# DevSecOps Pipeline — Phase 7
# Trigger: PR vào main (GitHub Flow)
# Report: PR comment + Telegram
# Block merge: fail khi có CRITICAL

name: DevSecOps Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'common/**'
      - 'services/**'
      - 'frontend/**'
      - 'phase4-application-v2/**'
      - 'phase8-application-v3/**'
      - 'k8s-chatbot/**'

  workflow_dispatch:

jobs:
  # ============================================================
  # 1. Lint
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python
        run: |
          ruff check common services --ignore E501 2>/dev/null || true
          ruff check phase4-application-v2/common phase4-application-v2/services --ignore E501 2>/dev/null || true
          ruff check phase8-application-v3/common phase8-application-v3/services phase8-application-v3/producer --ignore E501 2>/dev/null || true
          ruff check k8s-chatbot/backend --ignore E501 2>/dev/null || true

  # ============================================================
  # 2. Test
  # ============================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r common/requirements.txt
          pip install -r phase4-application-v2/requirements-dev.txt

      - name: Run tests
        run: pytest -q phase4-application-v2/tests

  # ============================================================
  # 3. SAST — Trivy (filesystem)
  # ============================================================
  sast-trivy:
    name: SAST (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.5

      - name: Trivy FS scan
        run: |
          # Ghi report ra file (trivy ghi file trước khi exit)
          trivy fs . --severity HIGH,CRITICAL --ignore-unfixed --format table -o trivy-report.txt
          # exit-code 1 khi có vuln → block merge

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt

  # ============================================================
  # 4. SAST — Bandit (Python)
  # ============================================================
  sast-bandit:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Bandit scan
        id: bandit
        run: |
          bandit -r common services phase4-application-v2 phase8-application-v3 k8s-chatbot/backend \
            -s HIGH -f txt 2>&1 | tee bandit-report.txt
          # Bandit exits 1 when HIGH+ issues found → blocks merge

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.txt

  # ============================================================
  # 5. Dependency scan (pip audit)
  # ============================================================
  dep-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        id: audit
        run: |
          pip-audit -r common/requirements.txt \
            -r phase4-application-v2/common/requirements.txt \
            -r phase8-application-v3/common/requirements.txt \
            -r k8s-chatbot/backend/requirements.txt 2>&1 | tee audit-report.txt
          # pip-audit exits 1 when vulns found → blocks merge

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: audit-report.txt

  # ============================================================
  # 6. Report — PR comment + Telegram
  # ============================================================
  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [lint, test, sast-trivy, sast-bandit, dep-scan]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          merge-multiple: false

      - name: Build report
        id: report
        run: |
          {
            echo "## DevSecOps Report"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Lint | ${{ needs.lint.result }} |"
            echo "| Test | ${{ needs.test.result }} |"
            echo "| SAST (Trivy) | ${{ needs.sast-trivy.result }} |"
            echo "| SAST (Bandit) | ${{ needs.sast-bandit.result }} |"
            echo "| Dependency Scan | ${{ needs.dep-scan.result }} |"
            echo ""
          } > report.md

          FAILED=""
          [ "${{ needs.lint.result }}" != "success" ] && FAILED="$FAILED Lint"
          [ "${{ needs.test.result }}" != "success" ] && FAILED="$FAILED Test"
          [ "${{ needs.sast-trivy.result }}" != "success" ] && FAILED="$FAILED SAST-Trivy"
          [ "${{ needs.sast-bandit.result }}" != "success" ] && FAILED="$FAILED SAST-Bandit"
          [ "${{ needs.dep-scan.result }}" != "success" ] && FAILED="$FAILED DepScan"

          if [ -n "$FAILED" ]; then
            echo "**Merge blocked.** Failed:${FAILED}" >> report.md
            echo "" >> report.md
            # Append chi tiết report (chỉ job failed) vào PR comment
            if [ "${{ needs.sast-trivy.result }}" != "success" ]; then
              for f in "trivy-report/trivy-report.txt" "trivy-report.txt"; do
                [ -f "$f" ] && { echo "<details><summary>Trivy Report</summary>" >> report.md; echo '```' >> report.md; cat "$f" >> report.md; echo '```' >> report.md; echo "</details>" >> report.md; break; }
              done
            fi
            if [ "${{ needs.sast-bandit.result }}" != "success" ]; then
              for f in "bandit-report/bandit-report.txt" "bandit-report.txt"; do
                [ -f "$f" ] && { echo "<details><summary>Bandit Report</summary>" >> report.md; echo '```' >> report.md; cat "$f" >> report.md; echo '```' >> report.md; echo "</details>" >> report.md; break; }
              done
            fi
            if [ "${{ needs.dep-scan.result }}" != "success" ]; then
              for f in "audit-report/audit-report.txt" "audit-report.txt"; do
                [ -f "$f" ] && { echo "<details><summary>Dependency Scan Report</summary>" >> report.md; echo '```' >> report.md; cat "$f" >> report.md; echo '```' >> report.md; echo "</details>" >> report.md; break; }
              done
            fi
          else
            echo "All checks passed." >> report.md
          fi

          echo "" >> report.md
          echo "---" >> report.md
          echo "*Branch:* \`${{ github.head_ref }}\` | *Commit:* \`${{ github.sha }}\`" >> report.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('DevSecOps Report'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Notify Telegram (summary)
        uses: appleboy/telegram-action@master
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            <b>DevSecOps Report</b>
            Repo: ${{ github.repository }}
            PR: <a href="${{ github.event.pull_request.html_url }}">#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}</a>
            Branch: <code>${{ github.head_ref }}</code>
            Status: ${{ job.status }}
            Lint: ${{ needs.lint.result }} | Test: ${{ needs.test.result }} | SAST: ${{ needs.sast-trivy.result }} | Dep: ${{ needs.dep-scan.result }}

      - name: Send failed reports to Telegram
        if: |
          needs.sast-trivy.result != 'success' ||
          needs.sast-bandit.result != 'success' ||
          needs.dep-scan.result != 'success'
        continue-on-error: true
        run: |
          send_report() {
            local name="$1"
            local pattern="$2"
            local f
            f=$(find . -name "$pattern" -type f 2>/dev/null | head -1)
            [ -n "$f" ] && [ -f "$f" ] || return 0
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F "document=@$f" \
              -F "caption=🔒 $name - full report"
          }
          [ "${{ needs.sast-trivy.result }}" != "success" ] && send_report "Trivy SAST" "trivy-report.txt"
          [ "${{ needs.sast-bandit.result }}" != "success" ] && send_report "Bandit SAST" "bandit-report.txt"
          [ "${{ needs.dep-scan.result }}" != "success" ] && send_report "Dependency Scan" "audit-report.txt"
